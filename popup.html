<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Picker</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f7f9fc;
            --panel: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #d7deea;
            --accent: #2563eb;
            --accent-soft: #dbeafe;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            width: 360px;
            min-height: 220px;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(180deg, #eef3ff 0%, var(--bg) 100%);
            color: var(--text);
        }

        .shell {
            padding: 16px;
        }

        .card {
            background: var(--panel);
            border: 1px solid rgba(215, 222, 234, 0.95);
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(37, 99, 235, 0.08);
            padding: 16px;
        }

        .eyebrow {
            display: inline-block;
            margin-bottom: 10px;
            padding: 5px 9px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 6px;
            font-size: 18px;
        }

        p {
            margin: 0 0 14px;
            font-size: 13px;
            line-height: 1.45;
            color: var(--muted);
        }

        .list {
            display: grid;
            gap: 8px;
        }

        .account {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 11px 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #fbfdff;
            cursor: pointer;
            text-align: left;
        }

        .account:hover {
            border-color: #b9c8ff;
            box-shadow: 0 8px 22px rgba(37, 99, 235, 0.08);
        }

        .index {
            min-width: 26px;
            font-weight: 700;
            color: var(--accent);
        }

        .meta {
            flex: 1;
            min-width: 0;
        }

        .name {
            display: block;
            font-size: 13px;
            font-weight: 700;
            overflow-wrap: anywhere;
        }

        .email {
            display: block;
            margin-top: 2px;
            font-size: 12px;
            color: var(--muted);
            overflow-wrap: anywhere;
        }

        .empty {
            padding: 12px;
            border: 1px dashed var(--border);
            border-radius: 12px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.4;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-top: 12px;
        }

        .link, .secondary {
            border: 0;
            border-radius: 10px;
            padding: 9px 11px;
            font-size: 12px;
            cursor: pointer;
        }

        .link {
            background: var(--accent);
            color: #fff;
        }

        .secondary {
            background: #eef2ff;
            color: var(--text);
        }

        .status {
            min-height: 16px;
            margin-top: 10px;
            font-size: 12px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="card">
            <div id="eyebrow" class="eyebrow">Account picker</div>
            <h1 id="title">Open Gmail</h1>
            <p id="intro">Choose an account to open directly in the mailbox.</p>

            <div id="list" class="list"></div>

            <div class="footer">
                <button id="settingsBtn" class="secondary" title="Settings" type="button">⚙</button>
                <div style="flex:1"></div>
                <button id="refresh" class="secondary" type="button">Refresh</button>
                <button id="openChooser" class="link" type="button">Open chooser</button>
            </div>

            <div id="status" class="status"></div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
